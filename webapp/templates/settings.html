{% extends "base.html" %}
{% set active = 'settings' %}
{% block body %}
<h1>Settings</h1>
<p class="sub">Keys are stored in the app's data volume. Leave a field blank to keep the current value.</p>

<form method="post" action="{{ url_for('settings_view') }}">
  <div class="card">
    <div class="eyebrow" style="margin-bottom:14px">TMDB · required for TV &amp; movies</div>
    <label style="margin-top:0">TMDB API key <span class="hint">(v3 key or v4 read token)</span></label>
    <div class="key-row">
      <input type="password" name="tmdb_key"
             placeholder="{{ masked(tmdb_key) or 'Get a free key at themoviedb.org/settings/api' }}">
      {% if tmdb_key %}<span class="saved">✓ saved</span>{% endif %}
    </div>
  </div>

  <div style="display:flex;gap:12px">
    <button type="submit">Save settings</button>
    <a class="btn secondary" href="{{ url_for('index') }}">Back</a>
  </div>
</form>

<style>
  .key-row{display:flex;align-items:center;gap:10px}
  .saved{font-family:var(--mono);font-size:11.5px;color:var(--ok);white-space:nowrap;
    background:rgba(55,193,114,.1);border:1px solid rgba(55,193,114,.35);
    padding:6px 11px;border-radius:8px}
  form{max-width:620px}
</style>
{% endblock %}
