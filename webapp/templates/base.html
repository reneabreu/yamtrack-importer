<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Yamtrack Importer{% endblock %}</title>
  <style>
    :root{
      --bg:#0f1115; --card:#171a21; --card2:#1e222b; --line:#2a2f3a;
      --txt:#e6e8ec; --mut:#9aa3b2; --accent:#4f8cff; --ok:#38c172; --err:#ef5350;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--txt);
      font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    a{color:var(--accent);text-decoration:none}
    header{display:flex;align-items:center;justify-content:space-between;
      padding:16px 24px;border-bottom:1px solid var(--line);background:var(--card)}
    header .brand{font-weight:700;font-size:17px}
    header nav a{margin-left:18px;color:var(--mut)}
    header nav a:hover{color:var(--txt)}
    main{max-width:1080px;margin:0 auto;padding:28px 24px 60px}
    h1{font-size:22px;margin:0 0 4px}
    .sub{color:var(--mut);margin:0 0 24px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;
      padding:20px 22px;margin-bottom:18px}
    label{display:block;font-weight:600;margin:14px 0 6px}
    .hint{color:var(--mut);font-weight:400;font-size:13px}
    input[type=text],input[type=url],input[type=password],select{
      width:100%;padding:10px 12px;background:var(--card2);color:var(--txt);
      border:1px solid var(--line);border-radius:8px;font-size:14px}
    input[type=file]{width:100%;color:var(--mut);font-size:14px}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    .row>div{flex:1;min-width:220px}
    .checks label{display:flex;align-items:center;gap:8px;font-weight:400;margin:8px 0}
    .checks input{width:auto}
    button,.btn{background:var(--accent);color:#fff;border:0;border-radius:8px;
      padding:11px 18px;font-size:15px;font-weight:600;cursor:pointer}
    button.secondary{background:var(--card2);border:1px solid var(--line)}
    .flash{padding:11px 14px;border-radius:8px;margin-bottom:14px;font-size:14px}
    .flash.ok{background:rgba(56,193,114,.15);border:1px solid var(--ok);color:#a8e6c2}
    .flash.err{background:rgba(239,83,80,.15);border:1px solid var(--err);color:#f2b0ae}
    .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;
      border:1px solid var(--line);color:var(--mut);margin-left:8px}
    .pill.ready{color:var(--ok);border-color:var(--ok)}
    .src-list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .src{background:var(--card2);border:1px solid var(--line);border-radius:10px;
      padding:12px 14px}
    .src.planned{opacity:.55}
    .src .name{font-weight:600}
    .src .note{color:var(--mut);font-size:12.5px;margin-top:3px}
    table{width:100%;border-collapse:collapse;margin-top:8px}
    td,th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);font-size:14px}
    code{background:var(--card2);padding:1px 6px;border-radius:5px}
  </style>
</head>
<body>
  <header>
    <div class="brand">🎬 Yamtrack Importer</div>
    <nav>
      <a href="{{ url_for('index') }}">Migrate</a>
      <a href="{{ url_for('history') }}">History</a>
      <a href="{{ url_for('settings_view') }}">Settings</a>
    </nav>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block body %}{% endblock %}
  </main>
</body>
</html>
