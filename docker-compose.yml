services:
  yamtrack-importer:
    # Published image from GitHub Container Registry.
    # Default is :latest; pin a release with IMAGE_TAG, e.g. IMAGE_TAG=v1.0.0
    # Update to the newest build:  docker compose pull && docker compose up -d
    # Build locally instead:       docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
    image: ghcr.io/reneabreu/yamtrack-importer:${IMAGE_TAG:-latest}
    container_name: yamtrack-importer
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      # Optional default; you can also set this on the Settings page.
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      # Change in production.
      - SECRET_KEY=${SECRET_KEY:-change-me}
      - MAX_UPLOAD_MB=200
    restart: unless-stopped
